# TIKTIK go2rtc Configuration
# This file is a template — streams are configured via the admin dashboard
# and auto-generated by the /api/cameras/go2rtc-config endpoint.
#
# To auto-load streams from TIKTIK:
#   Replace the streams section with your actual camera configs from admin.
#
# Manual example for Lorex cameras:
#
# streams:
#   entrance_cam:
#     - rtsp://admin:YOUR_PASSWORD@192.168.1.100:554/cam/realmonitor?channel=1&subtype=1
#   classroom_1:
#     - rtsp://admin:YOUR_PASSWORD@192.168.1.100:554/cam/realmonitor?channel=2&subtype=1

api:
  listen: ":1984"
  origin: "*"  # Allow CORS from TIKTIK frontend

rtsp:
  listen: ":8554"

webrtc:
  listen: ":8555"
  candidates:
    - stun:stun.l.google.com:19302

streams: {}
